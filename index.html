<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevJobs - Find your next role</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-bracket">[</span>DevJobs<span class="logo-bracket">]</span>
      </div>
      <p class="header-sub">tech jobs · remote &amp; on-site</p>
    </div>
  </header>

  <main class="main-content">

    <!-- Buscar + filtrar -->
    <section class="search-section">
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Search by title, company or tech..."
        autocomplete="off"
      />
      <div class="filters" id="filterButtons">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="devops">DevOps</button>
        <button class="filter-btn" data-filter="backend">Backend</button>
        <button class="filter-btn" data-filter="frontend">Frontend</button>
        <button class="filter-btn" data-filter="cloud">Cloud</button>
        <button class="filter-btn" data-filter="fullstack">Full Stack</button>
      </div>
    </section>

    <!-- Numero de trabajos -->
    <p class="results-count" id="resultsCount">Loading jobs...</p>

    <!-- cards grid -->
    <div class="jobs-grid" id="jobsGrid">
    
    </div>

  </main>

  <!-- modal con detalles d etrabajo -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box" id="modalBox">
      <button class="modal-close" id="modalClose">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <footer class="site-footer">
    <p>built with HTML/CSS/JS · deployed via GitHub Actions · <a href="https://github.com/DevDiegoBrito/devjobs" target="_blank">source</a></p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
