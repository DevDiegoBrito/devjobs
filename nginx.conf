server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # servir archivos estáticos, fallback a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cachear assets estáticos un poco
    location ~* \.(css|js|json|png|ico|woff2)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # ocultar la versión de nginx por si acaso
    server_tokens off;
}
